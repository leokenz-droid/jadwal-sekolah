from IPython.display import HTML

HTML('''
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengingat Jadwal Sekolah</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .day-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #34495e;
        }
        textarea {
            width: 100%;
            height: 60px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-permission {
            background-color: #e67e22;
        }
        .btn-permission:hover {
            background-color: #d35400;
        }
        .info {
            font-size: 0.9em;
            color: #7f8c8d;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Pengingat Jadwal</h1>

    <div class="card">
        <p class="info">Notifikasi jadwal besok akan muncul otomatis hari ini antara jam 20:00 - 00:00.</p>
        <button class="btn-permission" onclick="requestNotificationPermission()">Izinkan Notifikasi Perangkat</button>
    </div>

    <div class="card" id="scheduleForm">
        <div class="day-group"><label>Senin</label><textarea id="Senin" placeholder="Contoh: Matematika, Fisika, B. Inggris..."></textarea></div>
        <div class="day-group"><label>Selasa</label><textarea id="Selasa"></textarea></div>
        <div class="day-group"><label>Rabu</label><textarea id="Rabu"></textarea></div>
        <div class="day-group"><label>Kamis</label><textarea id="Kamis"></textarea></div>
        <div class="day-group"><label>Jumat</label><textarea id="Jumat"></textarea></div>
        <div class="day-group"><label>Sabtu</label><textarea id="Sabtu"></textarea></div>
        <div class="day-group"><label>Minggu</label><textarea id="Minggu"></textarea></div>

        <button onclick="saveSchedule()">Simpan Jadwal</button>
    </div>

    <script>
        // Array hari yang sinkron dengan method getDay() di JavaScript (0 = Minggu, 1 = Senin, dst)
        const daysArray = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];

        // 1. Meminta izin untuk menampilkan notifikasi di browser/HP
        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("Browser ini tidak mendukung notifikasi desktop.");
            } else if (Notification.permission === "granted") {
                alert("Izin notifikasi sudah diberikan sebelumnya.");
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(function (permission) {
                    if (permission === "granted") {
                        alert("Notifikasi berhasil diaktifkan!");
                    }
                });
            }
        }

        // 2. Menyimpan inputan jadwal ke penyimpanan lokal browser
        function saveSchedule() {
            const schedules = {};
            daysArray.forEach(day => {
                const element = document.getElementById(day);
                if (element) {
                    schedules[day] = element.value;
                }
            });
            localStorage.setItem('schoolSchedules', JSON.stringify(schedules));
            alert("Jadwal berhasil disimpan!");
        }

        // 3. Memuat jadwal yang sudah tersimpan saat web dibuka
        function loadSchedule() {
            const schedules = JSON.parse(localStorage.getItem('schoolSchedules')) || {};
            daysArray.forEach(day => {
                const element = document.getElementById(day);
                if (element && schedules[day]) {
                    element.value = schedules[day];
                }
            });
        }

        // 4. Logika utama pengecekan jam dan hari untuk trigger notifikasi
        function checkAndShowNotification() {
            const now = new Date();
            const currentHour = now.getHours(); // Format 24 jam (0-23)
            const currentDayIndex = now.getDay(); // 0 (Minggu) sampai 6 (Sabtu)

            // Cek apakah waktu saat ini antara jam 20.00 malam dan sebelum 00.00 (jam 23:59)
            if (currentHour >= 20 && currentHour <= 23) {

                // Cari tahu besok hari apa
                const tomorrowIndex = (currentDayIndex + 1) % 7;
                const tomorrowName = daysArray[tomorrowIndex];

                // Ambil data jadwal dari storage
                const schedules = JSON.parse(localStorage.getItem('schoolSchedules')) || {};
                const tomorrowSchedule = schedules[tomorrowName];

                // Cek agar notifikasi hanya keluar 1 KALI dalam satu malam
                const lastNotifiedDate = localStorage.getItem('lastNotifiedDate');
                const todayString = now.toDateString(); // Contoh: "Sun Apr 26 2026"

                // Jika besok ada jadwal yang sudah diisi, dan hari ini belum dikirim notif
                if (tomorrowSchedule && tomorrowSchedule.trim() !== "" && lastNotifiedDate !== todayString) {

                    const title = `Persiapkan untuk Besok (${tomorrowName})!`;
                    const bodyText = `Jadwal kamu: \n${tomorrowSchedule}`;

                    // Tampilkan notifikasi sistem
                    if (Notification.permission === "granted") {
                        new Notification(title, { body: bodyText });
                    } else {
                        // Fallback jika notifikasi sistem diblokir
                        alert(`${title}\n\n${bodyText}`);
                    }

                    // Tandai bahwa hari ini sudah memunculkan notifikasi
                    localStorage.setItem('lastNotifiedDate', todayString);
                }
            }
        }

        // Jalankan load data pertama kali web dibuka
        loadSchedule();

        // Cek waktu dan jadwal setiap 1 menit (60000 milidetik)
        setInterval(checkAndShowNotification, 60000);

    </script>
</body>
</html>
'''
)
