<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sekolah Pintar</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlByb2dyYW1KYWR3YWwiLAogICJzaG9ydF9uYW1lIjogIkphZHdhbCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiOiAiIzI1NjNlYiIKfQ==">
    <style>
        :root { --p: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 400px; width: 90%; text-align: center; border: 1px solid #e2e8f0; }
        h2 { color: #1e293b; margin-top: 0; }
        input[type="file"] { margin: 1.5rem 0; padding: 1rem; border: 2px dashed #cbd5e1; width: 100%; box-sizing: border-box; cursor: pointer; border-radius: 0.5rem; }
        #status { font-size: 0.85rem; color: #64748b; margin-bottom: 1rem; font-weight: 500; }
        .item { background: #eff6ff; padding: 12px; margin: 8px 0; border-radius: 8px; text-align: left; font-size: 0.9rem; border-left: 5px solid var(--p); color: #1e40af; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 Jadwal Pintar</h2>
    <p id="status">Unggah foto jadwalmu. Sistem akan mengingatkanmu pada malam hari (20:00 - 23:59) untuk persiapan besok.</p>
    <input type="file" id="imageInput" accept="image/*">
    <div id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    // --- 1. OTOMATISASI SERVICE WORKER (Background Task) ---
    const swCode = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('message', e => {
            if (e.data.type === 'NOTIF') {
                self.registration.showNotification(e.data.title, {
                    body: e.data.body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/2693/2693507.png',
                    vibrate: [200, 100, 200]
                });
            }
        });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(swUrl).then(() => console.log("SW Ready"));
    }

    // --- 2. LOGIKA OCR & MEMBACA FOTO ---
    document.getElementById('imageInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "🌀 Membaca gambar... (Sabar ya)";
        output.innerHTML = "";

        try {
            const result = await Tesseract.recognize(file, 'ind');
            const lines = result.data.text.split('\n').filter(l => l.trim().length > 4);
            
            status.innerHTML = "✅ <b>Jadwal Tersimpan!</b><br>Notifikasi siap mengingatkanmu nanti malam.";
            localStorage.setItem('jadwal_data', JSON.stringify(lines));
            
            lines.forEach(text => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = text;
                output.appendChild(div);
            });

            if (Notification.permission !== 'granted') await Notification.requestPermission();
        } catch (err) {
            status.innerText = "❌ Gagal membaca gambar. Coba foto lebih jelas.";
        }
    });

    // Menampilkan kembali jadwal kalau website di-refresh
    window.onload = () => {
        const savedData = JSON.parse(localStorage.getItem('jadwal_data'));
        if (savedData && savedData.length > 0) {
            savedData.forEach(text => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = text;
                output.appendChild(div);
            });
            status.innerHTML = "✅ <b>Jadwal Aktif!</b><br>Sistem siap mengingatkanmu nanti malam.";
        }
    };

   </script>

    <input type="file" id="imageInput" accept="image/*">
    <div id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    // --- 1. OTOMATISASI SERVICE WORKER (Background Task) ---
    const swCode = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('message', e => {

                self.registration.showNotification(e.data.title, {
                    body: e.data.body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/2693/2693507.png',
                    vibrate: [200, 100, 200]
                });
            }
        });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(swUrl).then(() => console.log("SW Ready"));
    }

    // --- 2. LOGIKA OCR & MEMBACA FOTO ---
    document.getElementById('imageInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "🌀 Membaca gambar... (Sabar ya)";
        output.innerHTML = "";

        try {
            const result = await Tesseract.recognize(file, 'ind');
            const lines = result.data.text.split('\n').filter(l => l.trim().length > 4);
            
            status.innerHTML = "✅ <b>Jadwal Tersimpan!</b><br>Notifikasi siap mengingatkanmu nanti malam.";
            localStorage.setItem('jadwal_data', JSON.stringify(lines));
            
            lines.forEach(text => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = text;
                output.appendChild(div);
            });

            if (Notification.permission !== 'granted') await Notification.requestPermission();
        } catch (err) {
            status.innerText = "❌ Gagal membaca gambar. Coba foto lebih jelas.";
        }
    });

    // Menampilkan kembali jadwal kalau website di-refresh
    window.onload = () => {
        const savedData = JSON.parse(localStorage.getItem('jadwal_data'));
        if (savedData && savedData.length > 0) {
            savedData.forEach(text => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = text;
                output.appendChild(div);
            });
            status.innerHTML = "✅ <b>Jadwal Aktif!</b><br>Sistem siap mengingatkanmu nanti malam.";
        }
    };

    / --- 3. CEK WAKTU SETIAP MENIT ---
    setInterval(() => {
        const skrg = new Date();
        const jam = skrg.getHours();

        // Cek apakah sekarang berada di rentang Jam 8 Malam (20:00) sampai 11:59 Malam (23:59)
        if (jam >= 20 && jam <= 23) {
            
            // Mengambil tanggal hari ini untuk mencegah spam notifikasi
            const tanggalHariIni = skrg.toLocaleDateString('id-ID'); 
            const kapanTerakhirNotif = localStorage.getItem('tanggal_terakhir_notif');

            // Jika hari ini belum pernah dikirim notif, maka kirim!
            if (kapanTerakhirNotif !== tanggalHariIni) {
                
                // Daftar nama hari untuk mencari tahu besok hari apa
                const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                let indexBesok = skrg.getDay() + 1; // +1 untuk hari besok
                if (indexBesok > 6) indexBesok = 0; // Jika sabtu (6)+1 = 7, balik ke minggu (0)
                
                const hariBesok = namaHari[indexBesok];

                // Kirim notifikasi (Kecuali kalau besok hari Minggu alias libur)
                if (hariBesok !== "Minggu") {
                    if (navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({
                            type: 'NOTIF',
                            title: 🎒 Persiapan Sekolah Hari ${hariBesok}!,
                            body: Yuk cek aplikasi sekarang untuk melihat jadwal hari ${hariBesok} dan siapkan bukumu.
                        });
                        
                        // Kunci agar tidak dikirim ulang di menit berikutnya pada hari yang sama
                        localStorage.setItem('tanggal_terakhir_notif', tanggalHariIni);
                    }
                }
            }
        }
    }, 60000); // Cek rutin setiap 60 detik (1 menit)
</script>
